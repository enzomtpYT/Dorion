name: Draft release

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

jobs:
  create-release:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      # https://github.com/actions/upload-artifact/issues/21#issuecomment-2393490651
      - name: Download build artifacts
        run: |
          gh run download "$RUN_ID" -D "$OUTPUT_DIR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          OUTPUT_DIR: artifacts

      - name: Rename artifacts
        run: |
          mkdir -p renamed_artifacts

          for artifact_dir in artifacts/*/; do
            base_name=$(basename "$artifact_dir")
            
            # Determine the new filename based on the artifact name
            case "$base_name" in
              "dorion-aarch64-apple-darwin-dmg")
                new_name="Dorion_${{ steps.version.outputs.version }}_aarch64.dmg"
                ;;
              "dorion-aarch64-pc-windows-msvc-nsis")
                new_name="Dorion_${{ steps.version.outputs.version }}.arm64-setup.exe"
                ;;
              "dorion-aarch64-pc-windows-msvc-portable")
                new_name="Dorion_${{ steps.version.outputs.version }}_win_arm64_portable.zip"
                ;;
              "dorion-aarch64-unknown-linux-gnu-deb")
                new_name="Dorion_${{ steps.version.outputs.version }}_arm64.deb"
                ;;
              "dorion-aarch64-unknown-linux-gnu-portable")
                new_name="Dorion_${{ steps.version.outputs.version }}_arm64_portable.tar.gz"
                ;;
              "dorion-aarch64-unknown-linux-gnu-rpm")
                new_name="Dorion_${{ steps.version.outputs.version }}-1.aarch64.rpm"
                ;;
              "dorion-armv7-unknown-linux-gnueabihf-deb")
                new_name="Dorion_${{ steps.version.outputs.version }}_armhf.deb"
                ;;
              "dorion-armv7-unknown-linux-gnueabihf-portable")
                new_name="Dorion_${{ steps.version.outputs.version }}_armv7_portable.tar.gz"
                ;;
              "dorion-armv7-unknown-linux-gnueabihf-rpm")
                new_name="Dorion_${{ steps.version.outputs.version }}-1.armhfp.rpm"
                ;;
              "dorion-x86_64-apple-darwin-dmg")
                new_name="Dorion_${{ steps.version.outputs.version }}_x64.dmg"
                ;;
              "dorion-x86_64-pc-windows-msvc-nsis")
                new_name="Dorion_${{ steps.version.outputs.version }}_x64-setup.exe"
                ;;
              "dorion-x86_64-pc-windows-msvc-msi")
                new_name="Dorion_${{ steps.version.outputs.version }}_x64_en-US.msi"
                ;;
              "dorion-x86_64-pc-windows-msvc-portable")
                new_name="Dorion_${{ steps.version.outputs.version }}_win64_portable.zip"
                ;;
              "dorion-x86_64-unknown-linux-gnu-appimage")
                new_name="Dorion_${{ steps.version.outputs.version }}_amd64.AppImage"
                ;;
              "dorion-x86_64-unknown-linux-gnu-deb")
                new_name="Dorion_${{ steps.version.outputs.version }}_amd64.deb"
                ;;
              "dorion-x86_64-unknown-linux-gnu-portable")
                new_name="Dorion_${{ steps.version.outputs.version }}_amd64_portable.tar.gz"
                ;;
              "dorion-x86_64-unknown-linux-gnu-rpm")
                new_name="Dorion_${{ steps.version.outputs.version }}-1.x86_64.rpm"
                ;;
              *)
                # Skip unknown artifacts
                continue
                ;;
            esac

            # Find the actual artifact file in the directory (assuming there's only one file)
            artifact_file=$(find "$artifact_dir" -type f -print -quit)
            
            if [ -n "$artifact_file" ]; then
              echo "Renaming $artifact_file to $new_name"
              # Copy and rename the file
              cp "$artifact_file" "renamed_artifacts/$new_name"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: "If you can see this, I forgot to change the release description."
          files: renamed_artifacts/*
          draft: false